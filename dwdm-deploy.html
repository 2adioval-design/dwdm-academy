function show(cls,msg){const s=document.getElementById("status");s.className=cls;s.textContent=msg;s.style.display="block";}
async function deploy(){
  const btn=document.getElementById("btn");
  btn.disabled=true;
  show("info","Step 1/3 — Fetching current file SHA from GitHub...");
  try{
    const headers={"Authorization":"token "+TOKEN,"Accept":"application/vnd.github.v3+json"};
    const r1=await fetch("https://api.github.com/repos/"+REPO+"/contents/"+FILE,{headers});
    let sha="";
    if(r1.ok){const j=await r1.json();sha=j.sha;}
    show("info","Step 2/3 — Uploading "+Math.round(CONTENT_B64.length/1024)+"KB to GitHub API...");
    const body={message:"Deploy full LMS v4 (L1+L2+L3) from deployer",content:CONTENT_B64};
    if(sha)body.sha=sha;
    const r2=await fetch("https://api.github.com/repos/"+REPO+"/contents/"+FILE,{method:"PUT",headers:{...headers,"Content-Type":"application/json"},body:JSON.stringify(body)});
    if(r2.ok){
      show("ok","✅ Deployed! GitHub Pages is rebuilding dwdmacademy.com now.

Check https://dwdmacademy.com in about 2 minutes.");
    } else {
      const e=await r2.json();
      show("err","❌ GitHub API error "+r2.status+": "+(e.message||JSON.stringify(e)));
      btn.disabled=false;
    }
  }catch(e){
    show("err","❌ Network error: "+e.message);
    btn.disabled=false;
  }
}
</script>
