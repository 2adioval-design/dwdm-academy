@keyframes toastOut{from{transform:translateX(0);opacity:1}to{transform:translateX(120%);opacity:0}}
.fiber-line{position:absolute;height:2px;background:linear-gradient(90deg,transparent,var(--cy),transparent);opacity:.12;animation:fiberMove linear infinite}

// Ch1
CH_DATA[1]={
lesson:`<h2 class="text-xl font-bold mb-4">The Optical Networking Landscape</h2>
<p class="text-tx-2 text-sm leading-relaxed mb-4">The evolution of optical networking — from basic TDM to sophisticated DWDM — is fundamental to architect-level thinking. Understanding this progression reveals why DWDM dominates modern transport.</p>
<h3 class="text-base font-bold text-cy-4 mb-2">TDM → WDM → DWDM Evolution</h3>
<p class="text-tx-2 text-sm leading-relaxed mb-2"><strong class="text-tx-1">TDM (Time Division Multiplexing)</strong> dominated early optical transport — SONET/SDH divided time into slots, carrying multiple signals on a single wavelength. But TDM had a ceiling.</p>
<p class="text-tx-2 text-sm leading-relaxed mb-2"><strong class="text-tx-1">WDM</strong> broke this barrier by sending multiple wavelengths on a single fiber simultaneously. Early WDM: 2-8 channels with wide spacing (>20 nm).</p>
<p class="text-tx-2 text-sm leading-relaxed mb-4"><strong class="text-tx-1">DWDM</strong> tightened spacing to 100 GHz (~0.8 nm) then 50 GHz (~0.4 nm), enabling 40-96+ channels in C-band. This capacity multiplication without new fiber is why DWDM dominates.</p>
<div class="flex flex-wrap gap-2 mb-4 text-xs">${['1980s TDM','1990s WDM','1995 EDFA','2000s DWDM','2010 Coherent','2020s 400G/800G'].map((s,i)=>`<div class="flex items-center gap-1"><span class="w-6 h-6 rounded-full bg-cy-4/10 text-cy-4 flex items-center justify-center font-bold">${i+1}</span><span class="text-tx-2">${s}</span>${i<5?'<span class="text-tx-3 mx-1">→</span>':''}</div>`).join('')}</div>
<h3 class="text-base font-bold text-cy-4 mb-2">EDFA: The Key Enabler</h3>
<p class="text-tx-2 text-sm leading-relaxed mb-4">The <strong class="text-tx-1">Erbium-Doped Fiber Amplifier (EDFA)</strong> amplifies all wavelengths simultaneously in the optical domain. Unlike electronic regenerators (O-E-O per channel), EDFAs eliminated per-channel amplification cost.</p>
<h3 class="text-base font-bold text-cy-4 mb-2">DWDM vs CWDM vs ROADM</h3>
<div class="overflow-x-auto mb-4"><table><thead><tr><th>Feature</th><th>CWDM</th><th>DWDM (Fixed)</th><th>DWDM + ROADM</th></tr></thead><tbody>
<tr><td>Channel Spacing</td><td>20 nm</td><td>100/50 GHz</td><td>50/12.5 GHz (Flex)</td></tr>
<tr><td>Max Channels</td><td>8-18</td><td>40-96</td><td>96+ (Flex-grid)</td></tr>
<tr><td>Amplification</td><td>None</td><td>EDFA</td><td>EDFA + Raman</td></tr>
<tr><td>Reach</td><td>&lt;80 km</td><td>1000+ km</td><td>1000+ km</td></tr>
<tr><td>Reconfigurability</td><td>Fixed</td><td>Fixed</td><td>Software-defined</td></tr>
</tbody></table></div>
<h3 class="text-base font-bold text-cy-4 mb-2">Key Vendor Platforms</h3>
<div class="overflow-x-auto mb-4"><table><thead><tr><th>Vendor</th><th>Platform</th><th>Coherent DSP</th><th>Strength</th></tr></thead><tbody>
<tr><td class="text-tx-1 font-medium">Ciena</td><td>6500 / Waveserver</td><td>WaveLogic 6</td><td>Adaptive networking</td></tr>
<tr><td class="text-tx-1 font-medium">Nokia</td><td>1830 PSS</td><td>PSE-6s</td><td>Ultra-long-haul</td></tr>
<tr><td class="text-tx-1 font-medium">Infinera</td><td>GX / ICE7</td><td>ICE7</td><td>Nyquist subcarriers</td></tr>
<tr><td class="text-tx-1 font-medium">Huawei</td><td>OSN 9800</td><td>OptiXtreme</td><td>Global scale, OTN</td></tr>
<tr><td class="text-tx-1 font-medium">Cisco</td><td>NCS 1004/2000</td><td>Acacia</td><td>Open networking</td></tr>
</tbody></table></div>
<div class="callout"><p class="text-sm text-vi-4 font-semibold mb-1">Architect Mindset</p><p class="text-xs text-tx-2">EDFA was the single invention that made commercial DWDM viable. Without simultaneous multi-channel amplification, long-haul DWDM transport was economically impossible.</p></div>`,
concepts:[
  {t:'TDM',d:'Time Division Multiplexing — sharing a single channel by dividing time into slots'},
  {t:'WDM',d:'Wavelength Division Multiplexing — multiple wavelengths simultaneously on one fiber'},
  {t:'DWDM',d:'Dense WDM — tightly spaced wavelengths (50/100 GHz) enabling 40-96+ channels in C-band'},
  {t:'CWDM',d:'Coarse WDM — 20 nm spacing for short-reach, lower-cost applications without amplification'},
  {t:'EDFA',d:'Erbium-Doped Fiber Amplifier — amplifies all C-band wavelengths simultaneously using erbium-doped fiber'},
  {t:'ROADM',d:'Reconfigurable Optical Add/Drop Multiplexer — software-controlled wavelength routing'},
  {t:'C-Band',d:'Conventional band (1530-1565 nm) — primary DWDM operating window with EDFA gain'},
  {t:'Transponder',d:'Converts client signal to a DWDM wavelength for transport and back at the far end'},

  {q:'Which vendor platform uses WaveLogic DSP?',opts:['Nokia','Infinera','Ciena','Huawei'],c:2,exp:'WaveLogic is Ciena\'s coherent DSP family.'},
  {q:'What does ROADM stand for?',opts:['Reconfigurable Optical Add/Drop Multiplexer','Remote Optical Amplifier Device Module','Routing of All Data at Maximum','Redundant Optical Domain Management'],c:0,exp:'ROADM = Reconfigurable Optical Add/Drop Multiplexer — enabling software-controlled wavelength routing.'}

CH_DATA[2]={
lesson:`<h2 class="text-xl font-bold mb-4">Light and Fiber Fundamentals</h2>
<p class="text-tx-2 text-sm leading-relaxed mb-4">Every DWDM system begins with a photon traveling through glass. Understanding propagation, degradation, and fiber properties is the bedrock of optical architecture.</p>
<h3 class="text-base font-bold text-cy-4 mb-2">Fiber Types: ITU-T Standards</h3>
<div class="overflow-x-auto mb-4"><table><thead><tr><th>Standard</th><th>Name</th><th>Loss @1550nm</th><th>CD @1550nm</th><th>DWDM Use</th></tr></thead><tbody>
<tr><td class="font-medium text-tx-1">G.652</td><td>Standard SMF</td><td>0.20 dB/km</td><td>~17 ps/(nm·km)</td><td>Excellent — most deployed</td></tr>
<tr><td class="font-medium text-tx-1">G.653</td><td>Dispersion-Shifted</td><td>0.20 dB/km</td><td>~0</td><td>Poor — severe FWM</td></tr>
<tr><td class="font-medium text-tx-1">G.654</td><td>Cut-off Shifted</td><td>0.16 dB/km</td><td>~20 ps/(nm·km)</td><td>Excellent — submarine/ULH</td></tr>
<tr><td class="font-medium text-tx-1">G.655</td><td>NZDSF</td><td>0.22 dB/km</td><td>~4-8 ps/(nm·km)</td><td>Good — reduced CD</td></tr>
</tbody></table></div>
<h3 class="text-base font-bold text-cy-4 mb-2">Attenuation</h3>
<div class="formula-box mb-4">Span Loss (dB) = α × L<br><span class="text-xs text-tx-3">Where α = attenuation coefficient (dB/km), L = fiber length (km)</span></div>
<p class="text-tx-2 text-sm mb-4">G.652.D at 1550 nm: <strong class="text-tx-1">α ≈ 0.20 dB/km</strong>. Primary causes: Rayleigh scattering (dominant), absorption (OH⁻ ions), and bend loss.</p>
<h3 class="text-base font-bold text-cy-4 mb-2">Dispersion</h3>
<p class="text-tx-2 text-sm mb-2"><strong class="text-tx-1">Chromatic Dispersion (CD):</strong> Different wavelengths travel at different speeds, causing pulse broadening. G.652: ~17 ps/(nm·km). Compensated by coherent DSP.</p>
<p class="text-tx-2 text-sm mb-4"><strong class="text-tx-1">PMD:</strong> Polarization states travel at different speeds, measured in ps/√km. Modern fiber: &lt;0.1 ps/√km. Legacy: 0.5+ ps/√km — critical for 100G+ upgrades.</p>
<h3 class="text-base font-bold text-cy-4 mb-2">Nonlinear Effects</h3>
<div class="overflow-x-auto mb-4"><table><thead><tr><th>Effect</th><th>Type</th><th>DWDM Impact</th></tr></thead><tbody>
<tr><td class="font-medium text-tx-1">SPM</td><td>Kerr</td><td>Spectral broadening</td></tr>
<tr><td class="font-medium text-tx-1">XPM</td><td>Kerr</td><td>Inter-channel crosstalk</td></tr>
<tr><td class="font-medium text-tx-1">FWM</td><td>Kerr</td><td>Ghost channels — worst on G.653</td></tr>
<tr><td class="font-medium text-tx-1">SRS</td><td>Scattering</td><td>Power tilt across WDM channels</td></tr>
<tr><td class="font-medium text-tx-1">SBS</td><td>Scattering</td><td>Limits launch power ~7 dBm</td></tr>
</tbody></table></div>
<div class="callout"><p class="text-sm text-vi-4 font-semibold mb-1">Architect Mindset</p><p class="text-xs text-tx-2">Never set launch power based solely on OSNR. Always validate against the nonlinear threshold. On G.652, optimum is typically +1 to +3 dBm per channel for 50 GHz-spaced 100G coherent.</p></div>`,
concepts:[
  {t:'Attenuation',d:'Signal power loss in fiber, measured in dB/km. G.652.D: ~0.20 dB/km at 1550nm'},
  {t:'Chromatic Dispersion',d:'Pulse broadening from wavelength-dependent speed. G.652: ~17 ps/(nm·km)'},
  {t:'PMD',d:'Polarization Mode Dispersion — random differential delay, measured in ps/√km'},
  {t:'FWM',d:'Four-Wave Mixing — three wavelengths generate a fourth. Worst on zero-dispersion fiber'},
  {t:'SPM',d:'Self-Phase Modulation — signal\'s intensity modulates its own phase via Kerr effect'},
  {t:'XPM',d:'Cross-Phase Modulation — one channel modulates neighboring channels\' phase'},
  {t:'SRS',d:'Stimulated Raman Scattering — energy transfers short→long wavelengths, causing WDM power tilt'},

  {t:'G.652',d:'Standard single-mode fiber — most deployed worldwide. 0.20 dB/km, 17 ps/(nm·km) CD'},
  {t:'Rayleigh Scattering',d:'Intrinsic loss from molecular density variations — dominant mechanism, decreasing with λ⁴'}

<p class="text-tx-2 text-sm leading-relaxed mb-4">A DWDM system is an assembly of precision optical and electronic components. The architect must understand each component's role and design trade-offs.</p>

<p class="text-tx-2 text-sm leading-relaxed mb-4">The ITU-T wavelength grid is the foundation of every DWDM channel plan.</p>

CH_DATA[5]={
lesson:`<h2 class="text-xl font-bold mb-4">Optical Power and Link Budgets</h2>
<p class="text-tx-2 text-sm leading-relaxed mb-4">The link budget is the architect's most fundamental calculation: "Will the signal arrive with enough quality to be decoded?"</p>
<h3 class="text-base font-bold text-cy-4 mb-2">dBm and dB</h3>
<p class="text-tx-2 text-sm mb-4"><strong class="text-tx-1">dBm</strong> = absolute power vs 1 mW. 0 dBm = 1 mW. +3 dBm = 2 mW. +10 dBm = 10 mW.<br><strong class="text-tx-1">dB</strong> = relative ratio. +3 dB = double. +10 dB = 10×.</p>
<h3 class="text-base font-bold text-cy-4 mb-2">Total Span Loss Formula</h3>
<div class="formula-box mb-4">L<sub>total</sub> = (α × D) + (N<sub>conn</sub> × L<sub>conn</sub>) + (N<sub>splice</sub> × L<sub>splice</sub>) + Margin<br><span class="text-xs text-tx-3">α=dB/km, D=km, L<sub>conn</sub>=0.5dB typ, L<sub>splice</sub>=0.1dB typ, Margin=3dB</span></div>
<h3 class="text-base font-bold text-cy-4 mb-2">Worked Example: 80 km Span</h3>
<div class="bg-bg-1 rounded-lg p-3 mb-4 border border-cy-4/10 text-sm text-tx-2">
<p>Fiber: 0.20 × 80 = <strong class="text-tx-1">16.0 dB</strong></p>
<p>Connectors: 4 × 0.5 = <strong class="text-tx-1">2.0 dB</strong></p>
<p>Splices: 20 × 0.1 = <strong class="text-tx-1">2.0 dB</strong></p>
<p>Margin: <strong class="text-tx-1">3.0 dB</strong></p>
<p class="mt-1 text-cy-4 font-bold">Total = 23.0 dB</p></div>
<h3 class="text-base font-bold text-cy-4 mb-2">OSNR Formula</h3>
<div class="formula-box mb-4">OSNR ≈ 58 + P<sub>launch</sub> - NF - L<sub>span</sub> - 10×log₁₀(N)<br><span class="text-xs text-tx-3">P<sub>launch</sub>=dBm, NF=dB, L<sub>span</sub>=dB, N=spans</span></div>
<div class="callout"><p class="text-sm text-vi-4 font-semibold mb-1">Architect Mindset</p><p class="text-xs text-tx-2">Systems with zero margin fail within 5 years. Systems with 3 dB margin operate 15-20 years. Always include aging margin — the cost at deployment is a fraction of emergency upgrades later.</p></div>`,
concepts:[
  {t:'dBm',d:'Decibels relative to 1 mW. 0 dBm = 1 mW, +10 dBm = 10 mW, -10 dBm = 0.1 mW'},
  {t:'Span Loss',d:'Total optical power lost traversing a span — fiber + connectors + splices + margin'},
  {t:'OSNR',d:'Optical Signal-to-Noise Ratio — signal vs ASE noise in 0.1 nm bandwidth'},
  {t:'ASE Noise',d:'Amplified Spontaneous Emission — unavoidable EDFA noise, primary noise source'},

  {t:'Margin',d:'Extra dB for aging, temperature, repair splices. Standard minimum: 3 dB'},

],

lesson:`<h2 class="text-xl font-bold mb-4">Modulation Formats & Coherent Optics</h2>
<p class="text-tx-2 text-sm leading-relaxed mb-4">Modulation format choice directly determines capacity, reach, and spectral efficiency of every wavelength.</p>
<h3 class="text-base font-bold text-cy-4 mb-2">Modulation Comparison</h3>
<div class="overflow-x-auto mb-4"><table><thead><tr><th>Format</th><th>Bits/Sym</th><th>OSNR Req</th><th>Reach</th></tr></thead><tbody>
<tr><td class="font-medium text-tx-1">DP-BPSK</td><td>2</td><td>Low</td><td>~10,000+ km</td></tr>
<tr><td class="font-medium text-tx-1">DP-QPSK</td><td>4</td><td>Moderate</td><td>~3,000 km</td></tr>
<tr><td class="font-medium text-tx-1">DP-8QAM</td><td>6</td><td>Higher</td><td>~1,500 km</td></tr>
<tr><td class="font-medium text-tx-1">DP-16QAM</td><td>8</td><td>High</td><td>~600 km</td></tr>
<tr><td class="font-medium text-tx-1">DP-64QAM</td><td>12</td><td>Very High</td><td>~100 km</td></tr>
</tbody></table></div>
<h3 class="text-base font-bold text-cy-4 mb-2">Coherent Detection</h3>
<p class="text-tx-2 text-sm mb-4">Commercially dominant since ~2010. Recovers amplitude AND phase using local oscillator + 90° optical hybrid. Enables electronic dispersion compensation and dual-polarization.</p>
<h3 class="text-base font-bold text-cy-4 mb-2">FEC: Forward Error Correction</h3>
<div class="overflow-x-auto mb-4"><table><thead><tr><th>FEC Type</th><th>Pre-FEC BER</th><th>Overhead</th><th>Coding Gain</th></tr></thead><tbody>
<tr><td class="font-medium text-tx-1">HD-FEC</td><td>~1×10⁻⁴</td><td>7%</td><td>~6.2 dB</td></tr>
<tr><td class="font-medium text-tx-1">SD-FEC</td><td>~2×10⁻²</td><td>15-25%</td><td>~10-11 dB</td></tr>
</tbody></table></div>
<p class="text-tx-2 text-sm mb-4"><strong class="text-tx-1">Baud Rate vs Bit Rate:</strong> DP-QPSK at 32 GBaud = 32 × 2 × 2 = 128 Gbps gross ≈ 100 Gbps net after FEC.</p>
<div class="callout"><p class="text-sm text-vi-4 font-semibold mb-1">Architect Mindset</p><p class="text-xs text-tx-2">Never over-specify modulation. 400G DP-16QAM on a 200km metro wastes spectral efficiency. Match modulation to physics — always calculate available GSNR first.</p></div>`,

  {t:'QPSK',d:'Quadrature Phase Shift Keying — 4 phase states, 2 bits/symbol. Workhorse of 100G coherent'},
  {t:'16QAM',d:'16-point QAM — 4 bits/symbol using amplitude and phase. Metro 400G'},
  {t:'Coherent Detection',d:'Uses local oscillator to recover full field (amplitude + phase) of the signal'},
  {t:'DSP',d:'Digital Signal Processor — compensates CD, PMD, equalization, FEC in real-time'},
  {t:'SD-FEC',d:'Soft-Decision FEC — ~10-11 dB coding gain, tolerates pre-FEC BER ~2×10⁻²'},
  {t:'Baud Rate',d:'Symbol rate (GBaud). Determines optical bandwidth occupied'},
  {t:'DP (Dual Polarization)',d:'Independent data on X and Y polarizations, doubling spectral efficiency'},
  {t:'PCS',d:'Probabilistic Constellation Shaping — adjusts symbol probability to approach Shannon limit'}
],

  {q:'DP-16QAM carries how many bits per symbol?',opts:['2','4','6','8'],c:3,exp:'16QAM=4 bits × 2 polarizations = 8 bits/DP-symbol.'},
  {q:'SD-FEC outperforms HD-FEC because it uses:',opts:['More overhead','Log-likelihood ratios','Hardware decoding','Lower rates'],c:1,exp:'SD-FEC uses soft-decision information for ~10-11 dB coding gain.'},

  {q:'DP-QPSK at 32 GBaud delivers approximately:',opts:['50 Gbps','100 Gbps','200 Gbps','400 Gbps'],c:1,exp:'32×2×2=128 Gbps gross ≈ 100 Gbps net.'}

CH_DATA[7]={
lesson:`<h2 class="text-xl font-bold mb-4">DWDM Network Topologies</h2>
<p class="text-tx-2 text-sm leading-relaxed mb-4">Topology selection constrains every subsequent design decision — protection, scaling, complexity, and cost.</p>
<h3 class="text-base font-bold text-cy-4 mb-2">Topology Comparison</h3>
<div class="overflow-x-auto mb-4"><table><thead><tr><th>Topology</th><th>Protection</th><th>Scalability</th><th>Use Case</th></tr></thead><tbody>
<tr><td class="font-medium text-tx-1">Point-to-Point</td><td>1+1 or None</td><td>Limited</td><td>DCI, Long-haul express</td></tr>
<tr><td class="font-medium text-tx-1">Ring</td><td>Ring switch (~50ms)</td><td>Moderate</td><td>Metro/Regional</td></tr>
<tr><td class="font-medium text-tx-1">Mesh</td><td>Mesh restoration</td><td>High</td><td>Core/National</td></tr>
<tr><td class="font-medium text-tx-1">Hub-and-Spoke</td><td>Dual-homing</td><td>Moderate</td><td>Aggregation</td></tr>
</tbody></table></div>
<h3 class="text-base font-bold text-cy-4 mb-2">Protection Mechanisms</h3>
<p class="text-tx-2 text-sm mb-2"><strong class="text-tx-1">1+1:</strong> Signal on both working + protection. Fastest (~ms) but 50% capacity overhead.</p>
<p class="text-tx-2 text-sm mb-2"><strong class="text-tx-1">Ring:</strong> Redirects traffic around ring on cut. Sub-50ms optical layer protection.</p>
<p class="text-tx-2 text-sm mb-4"><strong class="text-tx-1">Mesh Restoration:</strong> Dynamic rerouting. Highest efficiency but slowest (100ms-seconds).</p>
<div class="callout"><p class="text-sm text-vi-4 font-semibold mb-1">Architect Mindset</p><p class="text-xs text-tx-2">Route diversity on paper ≠ route diversity in the ground. SRLG awareness is critical — verify physical route diversity through GIS analysis, not just topology diagrams.</p></div>`,

let sdk=null;

async function initSDK(){
  try{
    if(window.AppSDK){
      sdk=window.AppSDK;
      const doc=await sdk.get('dwdm','state');
      if(doc&&doc.data)S={...S,...doc.data};
    }
  }catch(e){console.log('SDK init:',e)}
}
async function save(){
  try{if(sdk)await sdk.upsert('dwdm','state',S)}catch(e){}
}

function getRank(){
  for(let i=RANKS.length-1;i>=0;i--){if(S.xp>=RANKS[i].min)return RANKS[i]}
  return RANKS[0];
}
function getNextRank(){
  const cur=getRank();
  const idx=RANKS.indexOf(cur);
  return idx<RANKS.length-1?RANKS[idx+1]:null;
}

function awardXP(amt,reason){
  S.xp+=amt;
  save();
  updateXPDisplay();
  showToast(`+${amt} XP — ${reason}`);
  addActivity(`Earned ${amt} XP: ${reason}`);
}

function unlockBadge(id){
  if(S.badges.includes(id))return;
  S.badges.push(id);
  const b=BADGES_DEF.find(x=>x.id===id);
  if(b)showToast(`🏅 Badge Unlocked: ${b.name}`);
  save();
}

function showToast(msg){
  const box=document.getElementById('toast-box-u1v2');
  const t=document.createElement('div');
  t.className='toast';
  t.innerHTML=`<i data-lucide="zap" class="w-4 h-4 text-am-4"></i><span class="text-sm font-semibold">${msg}</span>`;
  box.appendChild(t);
  lucide.createIcons({nameAttr:'data-lucide'});
  setTimeout(()=>t.remove(),3200);
}

function addActivity(text){
  S.activity.unshift({text,time:new Date().toLocaleString()});
  if(S.activity.length>20)S.activity.pop();
}

function updateXPDisplay(){
  const el=document.getElementById('xp-count-i9j0');
  if(el)el.textContent=S.xp;
}

function calcLinkBudget(){
  const v=id=>parseFloat(document.getElementById(id)?.value)||0;
  const atten=v('lb-fiber-f6'),len=v('lb-len-g7'),conn=v('lb-conn-h8'),cl=v('lb-cl-i9'),spl=v('lb-spl-j0'),sl=v('lb-sl-k1'),mgn=v('lb-mgn-l2'),pwr=v('lb-pwr-m3'),nf=v('lb-nf-n4');
  const fl=atten*len,connL=conn*cl,splL=spl*sl,tot=fl+connL+splL+mgn;
  const osnr=58+pwr-nf-tot;
  const set=(id,val)=>{const e=document.getElementById(id);if(e)e.textContent=val};
  set('lb-r-fl',fl.toFixed(2)+' dB');set('lb-r-cl',connL.toFixed(2)+' dB');set('lb-r-sl',splL.toFixed(2)+' dB');set('lb-r-mg',mgn.toFixed(1)+' dB');set('lb-r-tot',tot.toFixed(2)+' dB');set('lb-r-osnr',osnr.toFixed(1)+' dB');
  const statusEl=document.getElementById('lb-r-status');
  if(statusEl){
    if(tot<25&&osnr>15){statusEl.textContent='PASS ✓';statusEl.className='text-right font-bold text-em-4';}
    else if(tot<30){statusEl.textContent='MARGINAL ⚠';statusEl.className='text-right font-bold text-am-4';}
    else{statusEl.textContent='FAIL ✗';statusEl.className='text-right font-bold text-rd-4';}
  }
  const fEl=document.getElementById('lb-r-formula');
  if(fEl)fEl.textContent=`OSNR ≈ 58 + (${pwr}) - (${nf}) - (${tot.toFixed(1)}) = ${osnr.toFixed(1)} dB`;
}

function calcOsnr(){
  const spans=parseInt(document.getElementById('os-spans-a1')?.value)||5;
  const pwr=parseFloat(document.getElementById('os-pwr-b2')?.value)||0;
  const nf=parseFloat(document.getElementById('os-nf-c3')?.value)||5.5;
  const loss=parseFloat(document.getElementById('os-loss-d4')?.value)||20;
  const perSpan=58+pwr-nf-loss;
  const total=perSpan-10*Math.log10(spans);
  const el=document.getElementById('os-results-e5');
  if(!el)return;
  const status=total>15?'PASS ✓':total>12?'MARGINAL ⚠':'FAIL ✗';
  const col=total>15?'text-em-4':total>12?'text-am-4':'text-rd-4';
  el.innerHTML=`<div class="space-y-2 text-sm">
    <div class="flex justify-between"><span class="text-tx-2">OSNR per span:</span><span class="font-mono text-tx-1">${perSpan.toFixed(1)} dB</span></div>
    <div class="flex justify-between"><span class="text-tx-2">Cascade penalty (${spans} spans):</span><span class="font-mono text-tx-1">-${(10*Math.log10(spans)).toFixed(1)} dB</span></div>

function drawOtdr(){
  const c=document.getElementById('otdr-canvas-h8');if(!c)return;
  const ctx=c.getContext('2d');const W=c.width,H=c.height;
  ctx.clearRect(0,0,W,H);
  const len=parseFloat(document.getElementById('otdr-len-i9')?.value)||80;
  const att=parseFloat(document.getElementById('otdr-att-j0')?.value)||0.2;
  const spl=parseInt(document.getElementById('otdr-spl-k1')?.value)||5;
  const launch=0;const totalLoss=att*len;
  // Draw grid
  ctx.strokeStyle='rgba(0,212,255,0.08)';ctx.lineWidth=1;
  for(let i=0;i<10;i++){const y=H*0.1+i*(H*0.8/9);ctx.beginPath();ctx.moveTo(40,y);ctx.lineTo(W-10,y);ctx.stroke();}
  for(let i=0;i<=8;i++){const x=40+i*((W-50)/8);ctx.beginPath();ctx.moveTo(x,H*0.1);ctx.lineTo(x,H*0.9);ctx.stroke();}
  // Labels
  ctx.fillStyle='#64748b';ctx.font='9px Inter';
  ctx.fillText('dBm',5,15);ctx.fillText('Distance (km)',W/2-30,H-2);
  for(let i=0;i<=4;i++){ctx.fillText((-i*totalLoss/4).toFixed(0),5,H*0.1+i*(H*0.8/4)+3);}
  for(let i=0;i<=4;i++){ctx.fillText((i*len/4).toFixed(0),40+i*((W-50)/4)-8,H*0.95);}
  // Draw trace
  ctx.strokeStyle='#00d4ff';ctx.lineWidth=2;ctx.beginPath();
  const xScale=(W-50)/len;const yScale=(H*0.8)/Math.max(totalLoss+5,30);
  const x0=40,y0=H*0.1;
  ctx.moveTo(x0,y0);
  // launch pulse
  ctx.lineTo(x0+2,y0-10);ctx.lineTo(x0+5,y0);
  let events=[];let curLoss=0;
  const splicePos=[];for(let i=1;i<=spl;i++)splicePos.push(len*i/(spl+1));
  for(let d=0;d<=len;d+=0.5){
    let segLoss=att*d;
    let extra=0;
    splicePos.forEach(sp=>{if(d>=sp)extra+=0.1});
    const tl=segLoss+extra;
    const x=x0+d*xScale;const y=y0+tl*yScale;
    ctx.lineTo(x,y);
  }
  ctx.stroke();
  // Mark splices
  ctx.fillStyle='#f59e0b';
  splicePos.forEach((sp,i)=>{
    const x=x0+sp*xScale;const segLoss=att*sp+i*0.1;const y=y0+segLoss*yScale;
    ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();
    events.push({type:'Splice',dist:sp.toFixed(1),loss:'0.10 dB'});
  });
  // End of fiber
  const endX=x0+len*xScale;const endLoss=totalLoss+spl*0.1;const endY=y0+endLoss*yScale;
  ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(endX,endY,4,0,Math.PI*2);ctx.fill();
  events.push({type:'End of Fiber',dist:len.toFixed(1),loss:(endLoss).toFixed(2)+' dB total'});
  // Events table
  const evEl=document.getElementById('otdr-events-m3');
  if(evEl)evEl.innerHTML=`<h4 class="font-bold text-sm mb-2">Detected Events</h4><table><thead><tr><th>Type</th><th>Distance</th><th>Loss</th></tr></thead><tbody>${events.map(e=>`<tr><td>${e.type}</td><td>${e.dist} km</td><td>${e.loss}</td></tr>`).join('')}</tbody></table>`;
}

      </div>
      <div class="flex-1">
        <h2 class="font-bold text-lg mb-1">DWDM Foundations — Level 1</h2>
        <p class="text-xs text-tx-3 mb-3">${metCount}/${reqs.length} requirements met</p>
        <div class="space-y-2">
          ${reqs.map(r=>`<div class="flex items-center gap-2 text-sm"><i data-lucide="${r.done?'check-circle':'circle'}" class="w-4 h-4 ${r.done?'text-em-4':'text-tx-3'} flex-shrink-0"></i><span class="${r.done?'text-em-4':'text-tx-3'}">${r.label}</span></div>`).join('')}
        </div>
      </div>
    </div>
    ${allMet?`<div class="mt-6 cert-card"><p class="text-am-4 font-bold text-sm mb-2">🎓 CERTIFICATE UNLOCKED</p><p class="text-xs text-tx-2">DWDM Architect Program</p><p class="text-xs text-tx-2">Level 1 Certified: Foundations</p><p class="text-sm font-bold text-tx-1 my-2">${S.user.name.toUpperCase()}</p><p class="text-[10px] text-tx-3">Date: ${new Date().toLocaleDateString()}</p></div>`:''}
  </div>
  <div class="grid md:grid-cols-2 gap-4">
    <div class="card p-5 opacity-50"><div class="flex items-center gap-2 mb-2"><i data-lucide="lock" class="w-4 h-4 text-tx-3"></i><span class="text-xs font-bold text-vi-4 bg-vi-4/10 px-2 py-0.5 rounded">LEVEL 2</span></div><h3 class="font-bold">Architecture</h3><p class="text-xs text-tx-3">Complete Level 1 to unlock</p></div>
    <div class="card p-5 opacity-50"><div class="flex items-center gap-2 mb-2"><i data-lucide="lock" class="w-4 h-4 text-tx-3"></i><span class="text-xs font-bold text-tx-3 bg-tx-3/10 px-2 py-0.5 rounded">LEVEL 3</span></div><h3 class="font-bold text-tx-3">Production</h3><p class="text-xs text-tx-3">Coming 2027</p></div>
  </div>
  <footer class="text-center py-6 text-xs text-tx-3">Made by Copilot</footer>
</div>`;
}

// ===================== EVENT LISTENERS =====================
function attachListeners(){
  // Nav
  document.querySelectorAll('[data-nav]').forEach(b=>b.addEventListener('click',()=>nav(b.dataset.nav)));
  document.querySelectorAll('[data-tool]').forEach(b=>b.addEventListener('click',()=>nav('tool_detail',{id:b.dataset.tool})));
  document.querySelectorAll('[data-openlab]').forEach(b=>b.addEventListener('click',()=>nav('lab_detail',{id:b.dataset.openlab})));
  // Course sidebar chapters
  document.querySelectorAll('[data-ch]').forEach(b=>b.addEventListener('click',()=>{S.l1.curCh=parseInt(b.dataset.ch);S.l1.capTab='lesson';renderPage();}));
  document.querySelectorAll('[data-goto]').forEach(b=>b.addEventListener('click',()=>nav(b.dataset.goto)));
  // Course tabs
  document.querySelectorAll('[data-ctab]').forEach(b=>b.addEventListener('click',()=>{S.l1.capTab=b.dataset.ctab;renderPage();}));
  // Flashcards
  document.querySelectorAll('.flashcard').forEach(c=>c.addEventListener('click',()=>c.classList.toggle('flipped')));
  // Quiz
  document.querySelectorAll('.quiz-opt:not(.pointer-events-none)').forEach(o=>o.addEventListener('click',()=>{
    const qi=o.dataset.qi;
    document.querySelectorAll(`.quiz-opt[data-qi="${qi}"]`).forEach(x=>x.classList.remove('sel'));
    o.classList.add('sel');
  }));
  document.querySelectorAll('[data-submit-quiz]').forEach(b=>b.addEventListener('click',()=>{
    const chId=parseInt(b.dataset.submitQuiz);const ch=CH_DATA[chId];
    let score=0;
    ch.quiz.forEach((_,qi)=>{
      const sel=document.querySelector(`.quiz-opt.sel[data-qi="${qi}"]`);
      if(sel&&parseInt(sel.dataset.oi)===ch.quiz[qi].c)score++;
    });
    S.l1.quizScores['q'+chId]=score;
    if(score>=3){
      if(S.l1.modProg[chId]!=='complete'){
        S.l1.modProg[chId]='complete';
        awardXP(100,`Chapter ${chId} Quiz Passed (${score}/5)`);
        addActivity(`Completed Chapter ${chId}: ${CHAPTERS.find(c=>c.id===chId)?.short}`);
        if(chId===3&&score>=4)unlockBadge('roadm_ready');
      }
    }
    save();renderPage();
  }));
  document.querySelectorAll('[data-retry-quiz]').forEach(b=>b.addEventListener('click',()=>{
    delete S.l1.quizScores['q'+b.dataset.retryQuiz];save();renderPage();
  }));
  // Drill
  document.querySelectorAll('[data-submit-drill]').forEach(b=>b.addEventListener('click',()=>{
    const chId=parseInt(b.dataset.submitDrill);
    const inp=document.getElementById('drill-input-e5');
    if(!inp||inp.value.length<50){showToast('Write at least 50 characters.');return;}
    if(!S.l1.drillsDone.includes(chId)){S.l1.drillsDone.push(chId);awardXP(50,`Ch${chId} Architect Drill`);}
    save();renderPage();
  }));
  // Lab complete
  document.querySelectorAll('[data-complete-lab]').forEach(b=>b.addEventListener('click',()=>{
    const labId=b.dataset.completeLab;
    if(!S.l1.labsDone.includes(labId)){
      S.l1.labsDone.push(labId);
      awardXP(150,`Lab ${labId} Completed`);
      addActivity(`Completed Lab ${labId}`);
      if(labId==='1.6')unlockBadge('link_budget');
    }
    save();renderPage();
  }));
  // Link budget calc inputs
  ['lb-fiber-f6','lb-len-g7','lb-conn-h8','lb-cl-i9','lb-spl-j0','lb-sl-k1','lb-mgn-l2','lb-pwr-m3','lb-nf-n4'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.addEventListener('input',calcLinkBudget);
  });
  if(document.getElementById('lb-fiber-f6'))calcLinkBudget();
  // dB converter
  const dbmIn=document.getElementById('db-dbm-a1');const mwIn=document.getElementById('db-mw-b2');
  if(dbmIn)dbmIn.addEventListener('input',()=>{const v=parseFloat(dbmIn.value);if(!isNaN(v))mwIn.value=Math.pow(10,v/10).toFixed(4);});
  if(mwIn)mwIn.addEventListener('input',()=>{const v=parseFloat(mwIn.value);if(v>0)dbmIn.value=(10*Math.log10(v)).toFixed(2);});
  const dbIn=document.getElementById('db-db-c3');const ratIn=document.getElementById('db-ratio-d4');
  if(dbIn)dbIn.addEventListener('input',()=>{const v=parseFloat(dbIn.value);if(!isNaN(v))ratIn.value=Math.pow(10,v/10).toFixed(4);});
  if(ratIn)ratIn.addEventListener('input',()=>{const v=parseFloat(ratIn.value);if(v>0)dbIn.value=(10*Math.log10(v)).toFixed(2);});
  // OSNR calc
  ['os-spans-a1','os-pwr-b2','os-nf-c3','os-loss-d4'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.addEventListener('input',calcOsnr);
  });
  if(document.getElementById('os-spans-a1'))calcOsnr();
  // Channel plan
  document.querySelectorAll('[data-chidx]').forEach(s=>s.addEventListener('click',()=>{
    const i=parseInt(s.dataset.chidx);
    S.toolData.chanPlan[i]=(S.toolData.chanPlan[i]+1)%4;save();renderPage();
  }));
  document.querySelectorAll('[data-preset-40ch]').forEach(b=>b.addEventListener('click',()=>{
    S.toolData.chanPlan=new Array(96).fill(0);for(let i=0;i<96;i+=2)S.toolData.chanPlan[i]=1;save();renderPage();
  }));
  document.querySelectorAll('[data-clear-ch]').forEach(b=>b.addEventListener('click',()=>{
    S.toolData.chanPlan=new Array(96).fill(0);save();renderPage();
  }));
  // Fiber selector
  document.querySelectorAll('.fiber-dist,.fiber-app,.fiber-ch').forEach(b=>b.addEventListener('click',()=>{
    b.classList.toggle('!bg-cy-4/15');b.classList.toggle('!border-cy-4');b.classList.toggle('!text-cy-4');
    unlockBadge('fiber_spec');
    const el=document.getElementById('fiber-result-g7');
    if(el)el.innerHTML=`<div class="bg-bg-1 rounded-lg p-4 border border-em-4/15"><h4 class="font-bold text-sm text-em-4 mb-2">Recommendation</h4><p class="text-sm text-tx-2"><strong class="text-tx-1">G.652D</strong> is recommended for most terrestrial DWDM deployments. It offers the best balance of cost, performance (0.20 dB/km, 17 ps/nm·km CD), and compatibility with all vendor platforms. Consider <strong class="text-tx-1">G.654E</strong> for ultra-long-haul or submarine applications where the lower 0.16 dB/km loss provides significant span budget improvement.</p></div>`;
  }));
  // OTDR
  const otdrBtn=document.getElementById('otdr-draw-l2');
  if(otdrBtn)otdrBtn.addEventListener('click',drawOtdr);
  // ROADM
  ['roadm-deg-a1','roadm-ad-b2'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('input',calcRoadm)});
  document.querySelectorAll('[data-cdcf]').forEach(c=>c.addEventListener('change',calcRoadm));
  if(document.getElementById('roadm-deg-a1'))calcRoadm();
  // Capstone
  document.querySelectorAll('[data-cap-next]').forEach(b=>b.addEventListener('click',()=>{
    if(!S.capstone)S.capstone={step:1,data:{}};
    const step=parseInt(b.dataset.capNext);
    // Save current step data
    if(step===1){
      S.capstone.data.name=document.getElementById('cap-name-a1')?.value||'';
      S.capstone.data.nodes=document.getElementById('cap-nodes-b2')?.value||5;
      S.capstone.data.dist=document.getElementById('cap-dist-c3')?.value||300;
      S.capstone.data.topo=document.getElementById('cap-topo-d4')?.value||'ring';
      S.capstone.data.rate=document.getElementById('cap-rate-e5')?.value||'100G';
      S.capstone.data.prot=document.getElementById('cap-prot-f6')?.value||'ring';
    }
    if(step===2){
      S.capstone.data.fiber=document.getElementById('cap-fiber-g7')?.value||'G.652D';
      S.capstone.data.span=document.getElementById('cap-span-h8')?.value||80;
      S.capstone.data.fiberJ=document.getElementById('cap-fiberj-j0')?.value||'';
    }
    if(step===4){
      S.capstone.data.grid=document.getElementById('cap-grid-k1')?.value||'50GHz';
      S.capstone.data.chCount=document.getElementById('cap-chcount-l2')?.value||40;
    }
    S.capstone.step=step+1;save();renderPage();
  }));
  document.querySelectorAll('[data-cap-prev]').forEach(b=>b.addEventListener('click',()=>{
    S.capstone.step=parseInt(b.dataset.capPrev)-1;save();renderPage();
  }));
  document.querySelectorAll('[data-cap-submit]').forEach(b=>b.addEventListener('click',()=>{
    const just=document.getElementById('cap-just-m3')?.value||'';
    if(just.length<100){showToast('Write at least 100 characters in your justification.');return;}
    S.capstone.data.justification=just;
    S.capstone.submitted=true;
    awardXP(500,'Capstone Submitted!');
    unlockBadge('capstone_done');
    addActivity('Level 1 Capstone submitted!');
    save();renderPage();
  }));
  // Sidebar toggle mobile
  const sbToggle=document.getElementById('sb-toggle-d4');
  const sbEl=document.getElementById('course-sidebar-b2');
  const sbOv=document.getElementById('sb-overlay-a1');
  if(sbToggle&&sbEl){
    sbToggle.addEventListener('click',()=>{sbEl.classList.toggle('open');sbOv?.classList.toggle('open')});
  }
  if(sbOv)sbOv.addEventListener('click',()=>{sbEl?.classList.remove('open');sbOv.classList.remove('open')});
  // Logo
  document.getElementById('logo-btn-c3d4')?.addEventListener('click',()=>nav('dashboard'));
  // Mobile menu
  document.getElementById('mob-menu-btn-m3n4')?.addEventListener('click',()=>document.getElementById('mob-menu-o5p6').classList.remove('hidden'));
  document.getElementById('mob-close-q7r8')?.addEventListener('click',closeMobMenu);
}

// ===================== INIT =====================
async function boot(){
  await initSDK();
  renderPage();
}
boot();
</script>
</body>
</html>
